# Spring profile: dev
# Activated via `--spring.profiles.active=dev` or `SPRING_PROFILES_ACTIVE=dev`.
#
# Overrides the default error-body format so error responses are emitted as
# RFC 7807 ProblemDetail JSON (Content-Type: application/problem+json) instead
# of the legacy raw-string body. Useful when developing against a frontend that
# already understands the structured shape.
bovina.error.legacy-format=false
