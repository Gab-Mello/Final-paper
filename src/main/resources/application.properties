spring.application.name=pive

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pivedatabase}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Actuator: expose only the health endpoint over HTTP. Liveness/readiness
# probes go to /actuator/health. Other actuator endpoints stay disabled
# unless explicitly opted into via env.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Graceful shutdown: on SIGTERM, stop accepting new requests but let
# in-flight ones finish (up to the timeout below) before the JVM exits.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Error response body shape. Default (true) keeps the legacy raw-string body
# that the current frontend expects. Set to false to emit RFC 7807 ProblemDetail
# JSON for every error response (use only after the frontend is updated).
bovina.error.legacy-format=true
